<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // Encodes the full path into a query string and redirects to index.html.
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 2).join("/") +
          "/?p=" +
          encodeURIComponent(l.pathname.slice(1) + l.search) +
          (l.hash || ""),
      );
    </script>
  </head>
  <body></body>
</html>
