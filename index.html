    <script>
      // Restore path after GitHub Pages 404.html redirect.
      // IMPORTANT: preserve window.location.hash — it contains Telegram's
      // #tgWebAppData=... which the SDK must read on startup.
      (function () {
        var p = window.location.search
          .slice(1)
          .split("&")
          .find(function (s) {
            return s.startsWith("p=");
          });
        if (p) {
          var path = decodeURIComponent(p.slice(2));
          window.history.replaceState(
            null,
            null,
            "/" + path + window.location.hash,
          );
        }
      })();
    </script>
